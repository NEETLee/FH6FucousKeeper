name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc make

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path "release" -Force
          Copy-Item "build/FocusKeeper.exe" "release/"
          Copy-Item "build/hook.dll" "release/"
          Compress-Archive -Path "release/*" -DestinationPath "FH6FocusKeeper-$tag.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FH6 FocusKeeper ${{ github.ref_name }}
          generate_release_notes: true
          files: FH6FocusKeeper-*.zip
