name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download w64devkit
        shell: pwsh
        run: |
          $url = "https://github.com/skeeto/w64devkit/releases/download/v2.0.0/w64devkit-x64-2.0.0.zip"
          Invoke-WebRequest -Uri $url -OutFile w64devkit.zip
          Expand-Archive -Path w64devkit.zip -DestinationPath .

      - name: Build
        shell: pwsh
        run: |
          $env:PATH = "$PWD\w64devkit\bin;$env:PATH"
          make

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Path "release" -Force
          Copy-Item "build/FocusKeeper.exe" "release/"
          Copy-Item "build/hook.dll" "release/"
          Compress-Archive -Path "release/*" -DestinationPath "FH6FocusKeeper-$tag.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FH6 FocusKeeper ${{ github.ref_name }}
          generate_release_notes: true
          files: FH6FocusKeeper-*.zip
